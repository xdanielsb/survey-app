global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'survey-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      #  here check the targets
      #  http://localhost:9090/targets?search=
      - targets:
          - 'localhost:8080'

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'
