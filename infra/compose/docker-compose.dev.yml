services:
  db:
    image: postgres:17.5
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../../services/backend/db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms750m -Xmx750m
    ports:
      - "9200:9200"
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/9200'"
      interval: 10s
      timeout: 5s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:9.0.3
    container_name: logstash
    ports:
      - "5000:5000"
    environment:
      - ELASTIC_SEARCH_URL=http://elasticsearch:9200
      - ENVIRONMENT=development
    volumes:
      - ../monitoring/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/5000'"
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:9.0.3
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=admin
      - ELASTICSEARCH_PASSWORD=secret
    depends_on:
      - elasticsearch
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/5601'"
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1.1-management
    ports: [ "5672:5672", "15672:15672" ]
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/5672'"
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.0.2-alpine
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  patronx-worker:
    image: xdanielsb/patronx:2.2.0
    entrypoint: ["patronx"]
    command: ["start"]
    restart: unless-stopped
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /app/backups
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_REGION}
    volumes:
      - ../../backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  analytics:
    build:
      context: ../../services/analytics
      network: host
    container_name: ai-analytics
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - SENTRY_AUTH_DSN=${SENTRY_AUTH_DSN}
    depends_on:
      - ollama
      - logstash
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/8000'"
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:0.1.39
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/11434'"
      interval: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    command: > 
      start-dev
      --import-realm
      --verbose
    container_name: keycloak
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8082:8080"
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/8080'"
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: secret

volumes:
  db-data:
  pgadmin-data:
  ollama-data:
