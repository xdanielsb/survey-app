name: Analytics CI

on:
  push:
    paths:
      - 'services/analytics/**'
      - '.github/workflows/ci-analytics.yml'
    branches: [ master ]
  pull_request:
    paths:
      - 'services/analytics/**'
      - '.github/workflows/ci-analytics.yml'
    branches: [ master ]

jobs:
  analytics-tests:
    name: Run FastAPI Analytics Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analytics
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache uv
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('services/analytics/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e .[test]

      - name: Check import order with isort
        run: isort . --check --diff

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy src/analytics tests

      - name: Run pytest
        run: pytest -q
