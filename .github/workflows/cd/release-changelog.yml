name: Release Changelog

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous tag
        id: prevtag
        run: |
          echo "All tags (sorted):"
          git tag --sort=-creatordate
          echo "Current tag: $GITHUB_REF_NAME"
          PREV=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n1)
          echo "Detected previous tag: $PREV"
          echo "previous_tag=$PREV" >> $GITHUB_OUTPUT

      - name: List new commits and add compare link
        run: |
          PREV_TAG=${{ steps.prevtag.outputs.previous_tag }}
          CURR_TAG=${{ github.event.release.tag_name }}
          REPO="${{ github.repository }}"
          echo "🔗 [Compare changes](https://github.com/$REPO/compare/$PREV_TAG...$CURR_TAG)" > body.txt
          echo "" >> body.txt
          echo "## Commits in this release:" >> body.txt
          git log $PREV_TAG..$CURR_TAG --oneline >> body.txt
          cat body.txt

      - name: Add to release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.event.release.tag_name }} --notes-file body.txt
