<mat-toolbar color="primary">
  <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Menu">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="flex-spacer"></span>
  <span *ngIf="isLoggedIn" class="mr-2">{{ username }}</span>
  <button mat-button *ngIf="!isLoggedIn" (click)="login()">Login</button>
  <button mat-button *ngIf="isLoggedIn" (click)="logout()">Logout</button>
</mat-toolbar>

<mat-menu #menu="matMenu">
  <button mat-menu-item>Users</button>
</mat-menu>

<h1>Users</h1>
<table>
  <thead>
    <tr>
      <th>Id</th>
      <th>Email</th>
      <th>Credits</th>
      <th>Premium</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users">
      <td>{{ user.id }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.surveyCredits }}</td>
      <td>{{ user.premium }}</td>
    </tr>
  </tbody>
</table>
