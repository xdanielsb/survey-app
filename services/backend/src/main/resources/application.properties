# Database settings
spring.application.name=backend
spring.datasource.url=jdbc:postgresql://localhost:5432/survey
spring.datasource.username=admin
spring.datasource.password=secret

# Disable Hibernate auto DDL
spring.jpa.hibernate.ddl-auto=none

# Flyway settings
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Firebase
firebase.api.key=${FIREBASE_API_KEY:dummy}

# Disable Spring Shell interactive mode by default
spring.shell.interactive.enabled=false

# Sentry settings
sentry.dsn=${SENTRY_AUTH_DSN}
sentry.send-default-pii=true

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.price-id=${STRIPE_PRICE_ID}
stripe.frontend.url=${STRIPE_FRONTEND_URL}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# Monitoring and Metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.enable.all=true
management.endpoint.health.show-details=always

# AI Analytics service
analytics.service.url=${ANALYTICS_URL}

# SendGrid
sendgrid.api-key=${SENDGRID_API_KEY}
sendgrid.from-email=${SENDGRID_FROM_EMAIL}

# Rate Limiting
ratelimit.capacity=100
ratelimit.refill-ms=60000
