# Database settings
spring.application.name=backend
spring.datasource.url=jdbc:postgresql://localhost:5432/survey
spring.datasource.username=admin
spring.datasource.password=secret

# Disable Hibernate auto DDL
spring.jpa.hibernate.ddl-auto=none


# Flyway settings
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Firebase
firebase.api.key=${FIREBASE_API_KEY:dummy}


# Log file output
logging.file.name=logs/backend.log
logging.level.root=INFO
# Package-specific logging (optional)
logging.level.com.survey.backend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n